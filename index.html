<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/index.css" />
    <link rel="stylesheet" href="/responsive.css" />
    <link rel="stylesheet" href="/spin.css" />
    <link rel="stylesheet" href="/form.css" />
    <title>Constructor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!--                                                  -->
    <!--               OPEN HAMBURGER MENU                -->
    <!--                                                  -->
    <div class="hamburger-menu">
      <img src="/icons/hamburger.svg" class="svg-icon" />
    </div>

    <!-- SLIGHTLY DARKEN BACKGROUND OVERLAY FOR HAMBURGER -->
    <div class="overlay"></div>

    <div class="container">
      <div id="panel">
        <!--                                                  -->
        <!--                CLOSE MENU BUTTON                 -->
        <!--                                                  -->
        <div class="menu-close">
          <img src="/icons/close.svg" class="svg-icon" />
        </div>

        <div class="upper_navigation">
          <!--                                                  -->
          <!--               CAMPAIGN CREATOR TOOL              -->
          <!--                                                  -->
          <div id="action_buttons" class="group">
            <button id="new_campaign">
              <img src="/icons/new-campaign.svg" class="svg-icon" />

              New Campaign
            </button>
          </div>

          <!--                                                  -->
          <!--               SELECTS FOR RENDERING              -->
          <!--                                                  -->
          <div class="group">
            <div class="select-wrapper">
              <select class="select-select" id="campaigns">
                <option value="default">Select Campaign</option>
              </select>
              <span class="select-arrow"></span>
            </div>

            <div class="select-wrapper" style="display: none">
              <select class="select-select" id="templates">
                <option value="default">Select Template</option>
              </select>
              <span class="select-arrow"></span>
            </div>

            <div class="select-wrapper" style="display: none">
              <select class="select-select" id="shops"></select>
              <span class="select-arrow"></span>
            </div>

            <div class="select-wrapper" style="display: none">
              <select class="select-select" id="languages">
                <option value="default">Select Language</option>
              </select>
              <span class="select-arrow"></span>
            </div>

            <!-- <button id="render_template">
              <span style="width: 25px; height: 24px; line-height: 24px; text-align: center">👷🏿</span>
              Render Template
            </button> -->
          </div>

          <!--                                                  -->
          <!--            ADD PRODUCTS/CLEAR STORAGE            -->
          <!--                                                  -->
          <!-- Object.keys(localStorage).map(k => (localStorage.getItem(k) ?? '').length * 2 / 1024 / 1024).reduce((a, b) => a + b);        -->
          <div id="products_management" class="group">
            <button id="new_products">
              <img src="/icons/add-products.svg" class="svg-icon" />
              Manage Products
            </button>
          </div>

          <!--                                                  -->
          <!--             OPEN NSLT/LP/ISSUE/FIGMA             -->
          <!--                                                  -->
          <div id="campaign_links" class="group">
            <button style="display: none" class="openCampaign external">
              Open Newsletter
              <img src="/icons/external-link.svg" class="svg-icon" />
            </button>

            <button style="display: none" class="openContent openLP external">
              Open Content Page
              <img src="/icons/external-link.svg" class="svg-icon" />
            </button>

            <button style="display: none" class="openIssue external">
              Open Issue Card
              <img src="/icons/external-link.svg" class="svg-icon" />
            </button>

            <button class="figmaCard" style="display: none">
              <img src="/icons/figma.svg" class="svg-icon" />

              Figma Template
            </button>
          </div>

          <!--                                                  -->
          <!--                  COPY TEMPLATE                   -->
          <!--                                                  -->
          <button style="display: none" class="copyTemplate">
            <img src="/icons/copy-template.svg" class="svg-icon" />

            Copy Template
          </button>
        </div>

        <!--                                                  -->
        <!--                    PURGE TOOL                    -->
        <!--                                                  -->
        <div class="group">
          <div class="select-wrapper">
            <select class="select-select" id="purge">
              <option value="default">Select Purge</option>
              <option value="header">Purge Header</option>
              <option value="footer">Purge Footer</option>
              <option value="templates">Purge Templates</option>
              <option value="category_links">Purge Category Links</option>
              <option value="category_titles">Purge Category Titles</option>
            </select>
            <span class="select-arrow"></span>
          </div>

          <button class="purgeDynamicSpreadsheet external" style="width: 100%; display: none">
            <span style="width: 100%">Purge dynamic spreadsheet</span>
            <img src="/icons/external-link.svg" class="svg-icon" />
          </button>

          <button class="redirectCheck" style="width: 100%; display: none">
            <span style="width: 100%">Run redirect check</span>
            <img src="/icons/redirect.svg" class="svg-icon" />
          </button>
        </div>
      </div>

      <div id="app">
        <!--
        template injection: @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
      --></div>
    </div>

    <div id="formModal" class="modal-backdrop" style="display: none">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h2>Create Campaign</h2>
            <p>Fill in the details below to create a new campaign.</p>
          </div>
          <div>
            <img src="https://i.imgur.com/TwK7qLa.png" />
          </div>
        </div>

        <div class="form-content">
          <!--
            form injection: @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
          -->
        </div>
      </div>
    </div>

    <div id="productsModal" class="modal-backdrop" style="display: none">
      <div class="modal-content products-modal-content">
        <div class="modal-header">
          <div>
            <h2>Manage products</h2>
            <p class="products-modal-subtitle"></p>
          </div>
        </div>

        <div class="form-content products-modal-body"></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="src/app.js"></script>
    <script src="/hamburger.js"></script>
    <script type="module" src="/form/prepareCreatorForm.js"></script>
  </body>
</html>
