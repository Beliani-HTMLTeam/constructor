      function createPlaceholderImage({ options, name }, suffix, text, index) {
        const canvas = document.getElementById('placeholderCanvas');
        const ctx = canvas.getContext('2d');
        // Parametry
        const width = options.width || 299;
        const height = options.height || 50;
        const backgroundColor = options.backgroundColor || '#FBF5F5'; // Tło
        const textColor = options.textColor || '#000000'; // Kolor tekstu
        const fontFamily = options.fontFamily || 'Poppins, sans-serif'; // Czcionka (musisz mieć Poppins w systemie lub dodany do HTML)
        let fontSize = options.fontSize || 30;
        const value = text; // Tekst z nową linią
        ctx.clearRect(0, 0, width, height);

        // Sprawdzenie czy tekst mieści się w canvasie, jeśli nie - zmniejsz czcionkę
        do {
          ctx.font = `${fontSize}px ${fontFamily}`;
          const textWidth = Math.max(
            ...value.split('\n').map((line) => ctx.measureText(line).width)
          );
          if (textWidth > width - 20) {
            fontSize--;
          } else {
            break;
          }
        } while (fontSize > 10);

        // Ustawienie tła
        ctx.fillStyle = backgroundColor;
        ctx.fillRect(0, 0, width, height);

        // Ustawienie czcionki i koloru tekstu
        ctx.fillStyle = textColor;
        ctx.font = `${fontSize}px ${fontFamily}`;
        ctx.textAlign = 'center';

        // Podział tekstu na linie
        const lines = value.split('\n');
        const lineHeight = fontSize * 1.2; // Ustawienie odstępu między liniami

        // Pozycjonowanie tekstu (pionowe wyśrodkowanie)
        const totalTextHeight = lines.length * lineHeight;
        let yPos = (height - totalTextHeight) / 2 + fontSize; // Środek, przesunięty w dół o połowę wysokości tekstu

        // Renderowanie każdej linii
        lines.forEach((line) => {
          ctx.fillText(line, width / 2, yPos); // Wyśrodkowane poziomo
          yPos += lineHeight;
        });

        images.push({
          name: `${suffix.toLowerCase()}${context.name.value}_cat${index + 1}.png`,
          blob: canvas.toDataURL('image/jpg'),
        });
      }

      document.getElementById('download').addEventListener('click', () => {
        downloadAllImagesAsZip();
      });

      function downloadAllImagesAsZip() {
        const zip = new JSZip();
        images.forEach((image) => {
          const base64Data = image.blob.split(',')[1];
          zip.file(`${image.name}`, base64Data, { base64: true });
        });
        zip.generateAsync({ type: 'blob' }).then((content) => {
          saveAs(content, 'images.zip');
        });
      }

      for (const [k, v] of Object.entries(context.data)) {
        let index = 0;
        for (const [categoryKey, categoryValue] of Object.entries(v)) {
          createPlaceholderImage(context, k, categoryValue, index);
          index++;
        }
      }
      renderImages(images);

      function renderImages(images) {
        const btnsContainer = document.getElementById('btns');
        const groupedImages = {};

        images.forEach((image) => {
          const slug = image.name.match(/^[a-z]+/i)[0];
          if (!groupedImages[slug]) {
            groupedImages[slug] = [];
          }
          groupedImages[slug].push(image);
        });

        for (const [slug, images] of Object.entries(groupedImages)) {
          const slugContainer = document.createElement('div');
          slugContainer.classList.add('slug-container');

          const slugTitle = document.createElement('h3');
          slugTitle.textContent = slug.toUpperCase();
          slugContainer.appendChild(slugTitle);

          const buttonContainer = document.createElement('div');
          buttonContainer.classList.add('button-container');

          images.forEach(({ name, blob }) => {
            const button = document.createElement('button');
            button.addEventListener('click', () => {
              const link = document.createElement('a');
              link.download = name;
              link.href = blob;
              link.click();
            });
            button.textContent = name;

            // Dodaj podgląd po najechaniu
            button.addEventListener('mouseover', (event) => {
              let preview = document.getElementById('previewImage');
              if (!preview) {
                preview = document.createElement('img');
                preview.id = 'previewImage';
                document.body.appendChild(preview);
              }
              preview.src = blob;
              preview.alt = name;
              preview.style.left = `${event.clientX + 15}px`;
              preview.style.top = `${event.clientY + 15}px`;
            });

            button.addEventListener('mousemove', (event) => {
              const preview = document.getElementById('previewImage');
              if (preview) {
                preview.style.left = `${event.clientX + 15}px`;
                preview.style.top = `${event.clientY + 15}px`;
              }
            });

            button.addEventListener('mouseout', () => {
              const preview = document.getElementById('previewImage');
              if (preview) {
                preview.remove();
              }
            });

            buttonContainer.appendChild(button);
          });

          slugContainer.appendChild(buttonContainer);
          btnsContainer.appendChild(slugContainer);
        }
      }
